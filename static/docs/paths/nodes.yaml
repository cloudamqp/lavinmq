---
"/nodes":
  get:
    tags:
    - nodes
    description: Get statistics for all nodes.
    summary: Statistics for all nodes
    operationId: GetNodes
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/nodes"
      4XX:
        description: Client Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
      5XX:
        description: Server Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
"/nodes/{name}":
  parameters:
  - in: path
    name: name
    required: true
    schema:
      type: string
      description: Name of node.
  get:
    tags:
    - nodes
    description: Get statistics for specific node.
    summary: Statistics for single node
    operationId: GetNode
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/node"
      4XX:
        description: Client Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
      5XX:
        description: Server Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
"/nodes/gc_stats":
  get:
    tags:
    - nodes
    description: Get garbage collector profiling statistics for the current node.
      Requires administrator access.
    summary: Garbage collector statistics
    operationId: GetGCStats
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/gc_stats"
      4XX:
        description: Client Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
      5XX:
        description: Server Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
"/nodes/gc_collect":
  post:
    tags:
    - nodes
    description: Trigger a garbage collection cycle on the current node. Requires
      administrator access.
    summary: Run garbage collection on the current node
    operationId: RunGCCollect
    responses:
      '204':
        description: No Content
      4XX:
        description: Client Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
      5XX:
        description: Server Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
"/nodes/{name}/gc_collect":
  parameters:
  - in: path
    name: name
    required: true
    schema:
      type: string
      description: Name of node.
  post:
    tags:
    - nodes
    description: Trigger a garbage collection cycle on the specified node. Requires
      administrator access.
    summary: Run garbage collection
    operationId: RunNodeGCCollect
    responses:
      '204':
        description: No Content
      4XX:
        description: Client Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
      5XX:
        description: Server Error
        content:
          application/json:
            schema:
              "$ref": "../openapi.yaml#/components/schemas/ErrorResponse"
