---
nodes:
  type: array
  items:
    "$ref": "#/node"
node:
  type: object
  properties:
    applications:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
    channel_closed:
      type: integer
    channel_closed_details:
      type: object
      properties:
        rate:
          type: number
    channel_created:
      type: integer
    channel_created_details:
      type: object
      properties:
        rate:
          type: number
    connection_closed:
      type: integer
    connection_closed_details:
      type: object
      properties:
        rate:
          type: number
    connection_created:
      type: integer
    connection_created_details:
      type: object
      properties:
        rate:
          type: number
    cpu_sys_details:
      type: object
      properties:
        log:
          type: array
          items:
            type: number
    cpu_sys_time:
      type: integer
    cpu_user_details:
      type: object
      properties:
        log:
          type: array
          items:
            type: number
    cpu_user_time:
      type: integer
    db_dir:
      type: string
    disk_free:
      type: integer
    disk_free_details:
      type: object
      properties:
        log:
          type: array
          items:
            type: integer
    disk_total:
      type: integer
    disk_total_details:
      type: object
      properties:
        log:
          type: array
          items:
            type: integer
    fd_total:
      type: integer
    fd_used:
      type: integer
    followers:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          remote_address:
            type: string
          sent_bytes:
            type: integer
          acked_bytes:
            type: integer
          lag_in_bytes:
            type: integer
          compression_ratio:
            type: number
          uncompressed_bytes:
            type: integer
          compressed_bytes:
            type: integer
    io_read_count:
      type: integer
    io_read_details:
      type: object
      properties:
        log:
          type: array
          items:
            type: number
    io_write_count:
      type: integer
    io_write_details:
      type: object
      properties:
        log:
          type: array
          items:
            type: number
    mem_limit:
      type: integer
    mem_used:
      type: integer
    mem_used_details:
      type: object
      properties:
        log:
          type: array
          items:
            type: integer
    name:
      type: string
      description: Node hostname.
    os_pid:
      type: string
    partitions:
      type: array
    proc_used:
      type: integer
    processors:
      type: string
    queue_declared:
      type: integer
    queue_declared_details:
      type: object
      properties:
        rate:
          type: number
    queue_deleted:
      type: integer
    queue_deleted_details:
      type: object
      properties:
        rate:
          type: number
    run_queue:
      type: integer
    running:
      type: boolean
    sockets_used:
      type: integer
    uptime:
      type: integer
      description: Uptime in milliseconds.
gc_stats:
  type: object
  description: Garbage collector profiling statistics (admin only).
  properties:
    gc_no:
      type: integer
      description: Garbage collection cycle number. The value may wrap.
    heap_size:
      type: integer
      description: Heap size in bytes (including the area unmapped to OS).
    free_bytes:
      type: integer
      description: Total bytes contained in free and unmapped blocks.
    unmapped_bytes:
      type: integer
      description: Amount of memory unmapped to the OS.
    bytes_since_gc:
      type: integer
      description: Number of bytes allocated since the recent collection.
    bytes_before_gc:
      type: integer
      description: Number of bytes allocated before the recent garbage collection. The value may wrap.
    non_gc_bytes:
      type: integer
      description: Number of bytes not considered candidates for garbage collection.
    markers_m1:
      type: integer
      description: Number of marker threads (excluding the initiating one), or 0 if single-threaded.
    bytes_reclaimed_since_gc:
      type: integer
      description: Approximate number of reclaimed bytes after the recent garbage collection.
    reclaimed_bytes_before_gc:
      type: integer
      description: Approximate number of bytes reclaimed before the recent garbage collection. The value may wrap.
    expl_freed_bytes_since_gc:
      type: integer
      description: Number of bytes freed explicitly since the recent garbage collection.
    obtained_from_os_bytes:
      type: integer
      description: Total amount of memory obtained from the OS, in bytes.
