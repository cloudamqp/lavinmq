---
vhosts:
  type: array
  items:
    "$ref": "#/vhost"
vhost:
  type: object
  properties:
    name:
      type: string
      description: Name of the vhost.
    dir:
      type: string
      description: The directory on disk that maps to the vhost.
    cluster_state:
      type: object
    messages:
      type: integer
      description: Number of messages in the vhost.
    messages_unacknowledged:
      type: integer
      description: Number of unacknowledged messages in the vhost.
    messages_ready:
      type: integer
      description: Number of ready messages in the vhost.
    messages_stats:
      type: object
      properties:
        ack:
          type: integer
        confirm:
          type: integer
        deliver:
          type: integer
        get:
          type: integer
        get_no_ack:
          type: integer
        publish:
          type: integer
        redeliver:
          type: integer
        return_unroutable:
          type: integer
PutVhostRequestBody:
  type: object
  properties:
    description:
      type: string
      description: Optional description of the vhost.
    tags:
      type: string
      description: Optional comma-separated list of tags.
