[main]
data_dir = /var/lib/lavinmq
log_level = info
;pidfile = /var/run/lavinmq.pid
;default_user_only_loopback = true
;tls_cert = /etc/lavinmq/cert.pem
;tls_key = /etc/lavinmq/key.pem

[mgmt]
bind = ::
;port = 15672
;tls_port = 15671

[amqp]
bind = ::
;port = 5672
;tls_port = 5671

[mqtt]
bind = ::
;default_vhost = /
;port = 1883
;tls_port = 8883

[clustering]
enabled = false
bind = ::
;port = 5679
;advertised_uri = tcp://hostname.local:5679
;etcd_endpoints = localhost:2379

; OAuth2 / OpenID Connect. `issuer` is also used by the AMQP JWT authenticator;
; `client_id` and `mgmt_base_url` are only needed to enable SSO for the management UI.
; `mgmt_base_url` must use https:// in production (http:// is only allowed for localhost).
;[oauth]
;issuer = https://idp.example.com/realms/lavinmq
;client_id = lavinmq-mgmt
;mgmt_base_url = https://mq.example.com
